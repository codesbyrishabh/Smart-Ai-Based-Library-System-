<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartLIB | All Books</title>

<style>
:root {
    --primary-bg: #121212;
    --secondary-bg: #f4f7f6;
    --accent-cyan: #00d1ff;
    --text-main: #333;
    --card-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--secondary-bg);
    color: var(--text-main);
}

/* HEADER */
header {
    background-color: var(--primary-bg);
    padding: 1rem 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.logo {
    font-size: 1.5rem;
    font-weight: bold;
    color: white;
    text-decoration: none;
}

.logo span {
    color: var(--accent-cyan);
}

.search-bar {
    flex-grow: 0.5;
    margin: 0 2rem;
    padding: 8px 15px;
    border-radius: 20px;
    border: none;
    outline: none;
}

/* NAV LINKS */
nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-size: 0.95rem;
    transition: 0.2s;
}

nav a:hover {
    color: var(--accent-cyan);
}

/* CONTAINER */
.container {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 20px;
}

.section-title {
    font-size: 2rem;
    margin-bottom: 1.5rem;
    border-left: 5px solid var(--accent-cyan);
    padding-left: 15px;
}

/* BOOK GRID */
.books-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 25px;
}

.book-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: var(--card-shadow);
    cursor: pointer;
    display: flex;
    flex-direction: column;
}

.book-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.book-cover {
    width: 100%;
    height: 260px;
    object-fit: cover;
    background-color: #ddd;
}

.book-info {
    padding: 12px;
    flex-grow: 1;
}

.book-title {
    font-size: 0.95rem;
    font-weight: 600;
    margin: 0 0 5px 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.book-author {
    font-size: 0.8rem;
    color: #777;
    margin-bottom: 10px;
}

.book-tag {
    background: rgba(0, 209, 255, 0.1);
    color: #008eb0;
    font-size: 0.7rem;
    padding: 3px 8px;
    border-radius: 5px;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <a href="#" class="logo">Smart<span>LIB</span></a>
    <input type="text" class="search-bar" id="searchInput" placeholder="Search books...">
    <nav>
        <a href="ai_reader.html">AI Reader</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<div class="container">
    <h2 class="section-title">Explore Library</h2>
    <div class="books-grid" id="bookContainer"></div>
</div>

<script>
const books = [
{title:"Clean Code", author:"Robert C. Martin", tag:"Programming", cover:"https://covers.openlibrary.org/b/isbn/9780132350884-L.jpg"},
{title:"The Pragmatic Programmer", author:"Andrew Hunt & David Thomas", tag:"Programming", cover:"https://covers.openlibrary.org/b/isbn/9780201616224-L.jpg"},
{title:"Introduction to Algorithms", author:"Cormen et al.", tag:"Algorithms", cover:"https://covers.openlibrary.org/b/isbn/9780262033848-L.jpg"},
{title:"Design Patterns", author:"Erich Gamma et al.", tag:"Software Design", cover:"https://covers.openlibrary.org/b/isbn/9780201633610-L.jpg"},
{title:"Eloquent JavaScript", author:"Marijn Haverbeke", tag:"JavaScript", cover:"https://covers.openlibrary.org/b/isbn/9781593279509-L.jpg"},
{title:"Java Complete Reference", author:"Herbert Schildt", tag:"Java", cover:"https://covers.openlibrary.org/b/isbn/9781260440232-L.jpg"},
{title:"Effective Java", author:"Joshua Bloch", tag:"Java", cover:"https://covers.openlibrary.org/b/isbn/9780134685991-L.jpg"},
{title:"Head First Java", author:"Kathy Sierra", tag:"Java", cover:"https://covers.openlibrary.org/b/isbn/9780596009205-L.jpg"},
{title:"Python Crash Course", author:"Eric Matthes", tag:"Python", cover:"https://covers.openlibrary.org/b/isbn/9781593276034-L.jpg"},
{title:"Automate the Boring Stuff with Python", author:"Al Sweigart", tag:"Python", cover:"https://covers.openlibrary.org/b/isbn/9781593275990-L.jpg"},
{title:"Fluent Python", author:"Luciano Ramalho", tag:"Python", cover:"https://covers.openlibrary.org/b/isbn/9781491946008-L.jpg"},
{title:"Deep Learning", author:"Ian Goodfellow", tag:"AI", cover:"https://covers.openlibrary.org/b/isbn/9780262035613-L.jpg"},
{title:"Hands-On Machine Learning", author:"Aurelien Geron", tag:"AI", cover:"https://covers.openlibrary.org/b/isbn/9781492032649-L.jpg"},
{title:"Pattern Recognition and ML", author:"Christopher Bishop", tag:"AI", cover:"https://covers.openlibrary.org/b/isbn/9780387310732-L.jpg"},
{title:"Computer Networks", author:"Tanenbaum", tag:"Networking", cover:"https://covers.openlibrary.org/b/isbn/9780132126953-L.jpg"},
{title:"Operating System Concepts", author:"Silberschatz", tag:"OS", cover:"https://covers.openlibrary.org/b/isbn/9781118063330-L.jpg"},
{title:"Modern Operating Systems", author:"Tanenbaum", tag:"OS", cover:"https://covers.openlibrary.org/b/isbn/9780133591620-L.jpg"},
{title:"Database System Concepts", author:"Korth", tag:"Database", cover:"https://covers.openlibrary.org/b/isbn/9780073523323-L.jpg"},
{title:"SQL in 10 Minutes", author:"Ben Forta", tag:"Database", cover:"https://covers.openlibrary.org/b/isbn/9780135182796-L.jpg"},
{title:"Learning React", author:"Alex Banks", tag:"Web Dev", cover:"https://covers.openlibrary.org/b/isbn/9781492051725-L.jpg"},
{title:"HTML & CSS", author:"Jon Duckett", tag:"Web Dev", cover:"https://covers.openlibrary.org/b/isbn/9781118008188-L.jpg"},
{title:"JavaScript: The Good Parts", author:"Douglas Crockford", tag:"JavaScript", cover:"https://covers.openlibrary.org/b/isbn/9780596517748-L.jpg"},
{title:"Refactoring", author:"Martin Fowler", tag:"Software Engineering", cover:"https://covers.openlibrary.org/b/isbn/9780134757599-L.jpg"},
{title:"Code Complete", author:"Steve McConnell", tag:"Programming", cover:"https://covers.openlibrary.org/b/isbn/9780735619678-L.jpg"},
{title:"SICP", author:"Abelson & Sussman", tag:"CS Fundamentals", cover:"https://covers.openlibrary.org/b/isbn/9780262510875-L.jpg"},
{title:"Compilers", author:"Aho et al.", tag:"Compilers", cover:"https://covers.openlibrary.org/b/isbn/9780321486813-L.jpg"},
{title:"AI: Modern Approach", author:"Russell & Norvig", tag:"AI", cover:"https://covers.openlibrary.org/b/isbn/9780136042594-L.jpg"},
{title:"Grokking Algorithms", author:"Aditya Bhargava", tag:"Algorithms", cover:"https://covers.openlibrary.org/b/isbn/9781617292231-L.jpg"},
{title:"Linux Command Line", author:"William Shotts", tag:"Linux", cover:"https://covers.openlibrary.org/b/isbn/9781593273897-L.jpg"},
{title:"Linux Kernel Development", author:"Robert Love", tag:"Linux", cover:"https://covers.openlibrary.org/b/isbn/9780672329463-L.jpg"},
{title:"Kubernetes Up & Running", author:"Brendan Burns", tag:"DevOps", cover:"https://covers.openlibrary.org/b/isbn/9781492046530-L.jpg"},
{title:"Docker Deep Dive", author:"Nigel Poulton", tag:"DevOps", cover:"https://covers.openlibrary.org/b/isbn/9781521822807-L.jpg"},
{title:"Site Reliability Engineering", author:"Google", tag:"DevOps", cover:"https://covers.openlibrary.org/b/isbn/9781491929124-L.jpg"},
{title:"Cybersecurity Essentials", author:"Charles Brooks", tag:"Security", cover:"https://covers.openlibrary.org/b/isbn/9781119362395-L.jpg"}
];

const bookContainer = document.getElementById('bookContainer');
const searchInput = document.getElementById('searchInput');

function displayBooks(bookList){
    bookContainer.innerHTML = "";
    bookList.forEach(book=>{
        const card = document.createElement('div');
        card.className = 'book-card';
        card.innerHTML = `
            <img src="${book.cover}" class="book-cover">
            <div class="book-info">
                <p class="book-title">${book.title}</p>
                <p class="book-author">${book.author}</p>
                <span class="book-tag">${book.tag}</span>
            </div>
        `;
        bookContainer.appendChild(card);
    });
}

displayBooks(books);

searchInput.addEventListener("keyup", ()=>{
    const value = searchInput.value.toLowerCase();
    const filtered = books.filter(b =>
        b.title.toLowerCase().includes(value) ||
        b.author.toLowerCase().includes(value) ||
        b.tag.toLowerCase().includes(value)
    );
    displayBooks(filtered);
});
</script>

</body>
</html>
