<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>smartLIB - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Background matches your library theme */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Navigation Bar (Matching your Screenshot) --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: #000; /* Matching your dark header */
            color: white;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .logo span { color: #00d2ff; }

        .search-bar {
            flex: 0.5;
            display: flex;
            background: white;
            border-radius: 20px;
            padding: 5px 15px;
        }

        .search-bar input {
            border: none;
            outline: none;
            width: 100%;
            padding: 5px;
            font-size: 0.9rem;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* --- Login Card Section --- */
        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 60px; /* Offset for header */
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 50px 40px;
            width: 420px;
            text-align: center;
            color: white;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0.7;
        }

        .login-card h2 {
            font-size: 2.2rem;
            margin-bottom: 35px;
            font-weight: 600;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.4);
        }

        .input-group input {
            width: 100%;
            padding: 10px 40px 10px 5px;
            background: none;
            border: none;
            outline: none;
            color: white;
            font-size: 1rem;
        }

        .input-group i {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.8;
        }

        .options {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 30px;
        }

        .options a { color: white; text-decoration: none; }

        .login-btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: #111d2b; /* Dark Navy button */
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .login-btn:hover {
            background: #1a2e44;
            transform: scale(1.02);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.9rem;
        }

        .footer-text a {
            color: #00d2ff;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Smart<span>LIB</span></div>
        <div class="search-bar">
            <input type="text" placeholder="Search books, authors, topics...">
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Books</a></li>
                <li><a href="#">AI Reader</a></li>
                <li><a href="#">Dictionary</a></li>
                <li><a href="#">Login</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="login-card">
            <i class="fa-solid fa-xmark close-btn"></i>
            <h2>Login</h2>
            
            <form>
                <div class="input-group">
                    <input type="email" placeholder="Email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="options">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>

            <p class="footer-text">
                Don't have an account? <a href="#">Register</a>
            </p>
        </div>
    </div>

</body>
</html>
