<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLIB | AI Reader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        :root {
            --dark-bg: #121212;
            --accent-cyan: #00d1ff;
            --glass: rgba(255, 255, 255, 0.95);
            --border-color: #e2e8f0;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Nav Bar - Consistent with your theme */
        header {
            background: var(--dark-bg);
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .logo { font-size: 1.5rem; font-weight: bold; text-decoration: none; color: white; }
        .logo span { color: var(--accent-cyan); }

        /* Main AI Workspace */
        .ai-workspace {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow: hidden; /* Prevents body scroll */
        }

        /* Left Side: Document/Text Input */
        .reader-panel {
            flex: 1.5;
            background: white;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 20px;
        }

        .reader-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        textarea {
            flex: 1;
            border: none;
            resize: none;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #333;
            outline: none;
            padding: 10px;
        }

        /* Right Side: AI Insights */
        .ai-sidebar {
            flex: 1;
            background: white;
            border-radius: 15px;
            border-left: 4px solid var(--accent-cyan);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .ai-header {
            padding: 20px;
            background: #fafafa;
            border-bottom: 1px solid var(--border-color);
            border-radius: 15px 15px 0 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ai-content {
            padding: 20px;
            overflow-y: auto;
        }

        .ai-status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(0, 209, 255, 0.1);
            color: #008eb0;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .insight-card {
            background: #f8fafc;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #edf2f7;
        }

        .insight-card h4 { margin: 0 0 8px 0; color: var(--dark-bg); font-size: 0.9rem; }
        .insight-card p { margin: 0; font-size: 0.9rem; color: #555; line-height: 1.5; }

        /* Action Button */
        .analyze-btn {
            background: var(--dark-bg);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .analyze-btn:hover {
            background: var(--accent-cyan);
            transform: translateY(-2px);
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">Smart<span>LIB</span></a>
    <nav>
        <a href="index.html">Home</a>
        <a href="books.html">Books</a>
        <a href="ai_reader.html">AI Reader</a>
        <a href="dictionary.html">Dictionary</a>
        <a href="login.html">Login</a>
      </nav>
</header>

<main class="ai-workspace">
    <section class="reader-panel">
        <div class="reader-header">
            <h3>Document Viewer</h3>
            <div style="display: flex; gap: 10px;">
                <button title="Upload File" style="background: none; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; padding: 5px 10px;">
                    <i class="fas fa-file-upload"></i> Upload
                </button>
            </div>
        </div>
        <textarea id="textInput" placeholder="Paste your book chapter or article text here to begin analysis..."></textarea>
        <div style="display: flex; justify-content: flex-end; padding-top: 15px; border-top: 1px solid #eee;">
            <button class="analyze-btn" onclick="simulateAI()">
                <i class="fas fa-robot"></i> Analyze with AI
            </button>
        </div>
    </section>

    <aside class="ai-sidebar">
        <div class="ai-header">
            <i class="fas fa-brain" style="color: var(--accent-cyan); font-size: 1.5rem;"></i>
            <h3 style="margin: 0;">AI Insights</h3>
        </div>
        <div class="ai-content" id="aiOutput">
            <div style="text-align: center; color: #aaa; margin-top: 50px;">
                <i class="fas fa-magic fa-3x" style="margin-bottom: 15px; opacity: 0.3;"></i>
                <p>Waiting for text input...</p>
            </div>
        </div>
    </aside>
</main>

<script>
    function simulateAI() {
        const text = document.getElementById('textInput').value;
        const output = document.getElementById('aiOutput');

        if (!text) {
            alert("Please enter some text first!");
            return;
        }

        output.innerHTML = `
            <div class="ai-status pulse">AI is thinking...</div>
            <div class="insight-card">
                <h4><i class="fas fa-align-left"></i> Executive Summary</h4>
                <p>Based on your text, the AI identifies this as a technical discussion regarding digital infrastructure. Key themes include accessibility and smart management.</p>
            </div>
            <div class="insight-card">
                <h4><i class="fas fa-key"></i> Key Concepts</h4>
                <p>• Digital Libraries<br>• User Experience<br>• Information Retrieval</p>
            </div>
            <div class="insight-card">
                <h4><i class="fas fa-lightbulb"></i> AI Suggestion</h4>
                <p>This content pairs well with the "Modern Architecture" book in your Popular Books section.</p>
            </div>
        `;
    }
</script>

</body>
</html>
